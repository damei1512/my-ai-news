<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>美时美刻 - 人工智能 | 数码科技 | 游戏影视 | 时事热点</title>
    <style>
        /* ==================== CSS 变量定义 ==================== */
        :root {
            --primary: #2563eb;
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --shadow: rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border: #334155;
            --shadow: rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1a2744;
            color: var(--text-main);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }
        
        /* 视差背景层 - 宽度100%，高度自适应 */
        .parallax-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            /* 高度按原图比例自适应，最小保证一屏能看完 */
            height: auto;
            min-height: 100vh;
            aspect-ratio: 16 / 9; /* 根据你的图比例调整，如果是横图用 16/9，竖图用 9/16 */
            background: url('bg-new.png') center top / 100% auto no-repeat;
            z-index: -1;
            will-change: transform;
        }
        
        /* 背景图下方的延伸色 */
        .parallax-bg::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: linear-gradient(to bottom, transparent 0%, #1a2744 100%);
        }

        /* 移动端适配 - 保持宽度100%，高度按9:16比例 */
        @media (max-width: 768px) {
            .parallax-bg {
                aspect-ratio: 9 / 16;
                background-size: 100% auto;
                background-position: center top;
            }
            .parallax-bg::after {
                height: 200px;
            }
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px 16px; }

        /* ==================== 头部（完全透明）==================== */
        header { 
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 24px 0;
            margin: -20px 0 24px 0;
            background: transparent;
            border: none;
            position: relative;
            min-height: 200px;
        }
        
        /* 确保内容在遮罩之上 */
        header > * {
            position: relative;
            z-index: 1;
        }
        
        /* 标题文字加阴影确保可读性 */
        .brand h1 {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            -webkit-text-fill-color: #fff;
            background: none;
            flex-shrink: 0;
        }
        
        .brand p {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-top: 4px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        


        .brand-with-search {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex: 1;
        }

        /* ==================== 极简音乐播放器 ==================== */
        .brand-title-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: nowrap;
        }

        .mini-player {
            display: flex;
            align-items: center;
            gap: 4px;
            color: white;
        }

        /* 唱片机图标 */
        .vinyl-icon {
            width: 32px;
            height: 32px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .vinyl-icon svg {
            width: 100%;
            height: 100%;
            stroke: white;
            fill: none;
            stroke-width: 1.5;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }

        .vinyl-icon.playing svg {
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 控制按钮组 */
        .mini-player-controls {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .control-icon-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
        }

        .control-icon-btn:hover {
            transform: scale(1.1);
        }

        .control-icon-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }

        .mode-btn svg {
            width: 18px;
            height: 18px;
        }

        /* 单行歌词显示 - 在按钮后面 */
        .track-lyric-line {
            margin-left: 8px;
            height: 20px;
            max-width: 150px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .lyric-text {
            display: inline-block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            white-space: nowrap;
            transition: all 0.3s;
        }

        .lyric-text.playing {
            animation: scroll-text 10s linear infinite;
        }

        @keyframes scroll-text {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* 扩展播放器（歌单） */
        .expanded-player {
            position: absolute;
            top: 140px;
            left: 16px;
            width: 300px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .expanded-player.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        [data-theme="dark"] .expanded-player {
            background: rgba(30, 41, 59, 0.95);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .expanded-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .expanded-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .expanded-close {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-sub);
        }

        .playlist-container {
            max-height: 200px;
            overflow-y: auto;
        }

        .playlist-item-mini {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .playlist-item-mini:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .playlist-item-mini.active {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            font-weight: 500;
        }

        .playlist-item-mini .item-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .playlist-item-mini .item-info {
            flex: 1;
            min-width: 0;
        }

        .playlist-item-mini .item-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-item-mini .item-artist {
            font-size: 11px;
            color: var(--text-sub);
        }

        @media (max-width: 640px) {
            .brand-title-row {
                flex-wrap: nowrap;
                gap: 8px;
            }
            .mini-player {
                gap: 2px;
                flex-shrink: 1;
                min-width: 0;
            }
            .vinyl-icon {
                width: 28px;
                height: 28px;
            }
            .control-icon-btn {
                width: 24px;
                height: 24px;
            }
            .control-icon-btn svg {
                width: 16px;
                height: 16px;
            }
            .track-lyric-line {
                max-width: 80px;
                flex-shrink: 0;
            }
            .lyric-text {
                font-size: 12px;
            }
            .expanded-player {
                width: calc(100vw - 32px);
                left: 16px;
                right: 16px;
            }
        }

        .search-toggle-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            margin-top: 4px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .search-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .search-toggle-btn:active {
            transform: scale(0.95);
        }
        
        /* 放大镜图标 */
        .magnifier-icon {
            width: 20px;
            height: 20px;
            color: rgba(255, 255, 255, 0.9);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }
        .search-toggle-btn:hover .magnifier-icon {
            color: #fff;
        }
        .search-toggle-btn.active .magnifier-icon {
            transform: scale(1.6);
        }
        .search-toggle-btn.active .magnifier-icon line {
            opacity: 0;
        }
        .search-toggle-btn.active .magnifier-icon circle {
            stroke-width: 1.5;
        }

        .header-controls {
            display: flex; align-items: center; gap: 12px;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px; height: 40px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            transition: transform 0.2s;
        }
        .theme-toggle:hover { transform: scale(1.1); }

        .status-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--bg-card); border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 99px;
            font-size: 12px; color: var(--text-sub);
        }
        .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }

        /* ==================== 搜索框 ==================== */
        .search-box {
            position: relative;
            margin-bottom: 20px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }
        .search-box.active {
            max-height: 100px;
            opacity: 1;
            transform: translateY(0);
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--primary); }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 16px; top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }

        /* ==================== 分类筛选 ==================== */
        .category-filter {
            display: flex; flex-wrap: nowrap; gap: 6px;
            margin-bottom: 24px;
            padding: 4px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .category-filter::-webkit-scrollbar {
            display: none;
        }
        .category-btn {
            padding: 8px 14px;
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }
        .category-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.6);
        }
        .category-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        /* 分类颜色 - 渐变质感 */
        .category-btn[data-cat="人工智能"].active { 
            background: linear-gradient(135deg, #9f7aea 0%, #7c3aed 100%);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .category-btn[data-cat="数码科技"].active { 
            background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .category-btn[data-cat="游戏影视"].active { 
            background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .category-btn[data-cat="时事热点"].active { 
            background: linear-gradient(135deg, #f87171 0%, #dc2626 100%);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        /* 选中状态 - 柔和发光效果 */
        .category-btn.active {
            border-color: rgba(255,255,255,0.6);
            position: relative;
        }
        
        /* 使用伪元素创建柔和光晕 */
        .category-btn.active::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 99px;
            background: inherit;
            filter: blur(8px);
            opacity: 0.4;
            z-index: -1;
        }

        /* 暗色模式下的分类按钮 */
        [data-theme="dark"] .category-btn {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
        }
        [data-theme="dark"] .category-btn:hover {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(255, 255, 255, 0.25);
        }
        /* 暗色模式下选中状态 - 柔和发光 */
        [data-theme="dark"] .category-btn.active::before {
            opacity: 0.6;
            filter: blur(12px);
        }

        /* 按钮图标样式 */
        .btn-icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
            margin-right: 4px;
            flex-shrink: 0;
        }

        /* ==================== 新闻卡片（液态玻璃效果）==================== */
        .news-list { display: grid; gap: 20px; }

        .card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            overflow: hidden;
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.75);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        /* 暗色模式下的卡片 */
        [data-theme="dark"] .card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        [data-theme="dark"] .card:hover {
            background: rgba(30, 41, 59, 0.75);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        /* 卡片布局：左侧图片 + 右侧内容 */
        .card-body {
            display: flex;
            gap: 16px;
            padding: 16px;
        }

        /* 图片区域（玻璃效果适配） */
        .card-image {
            flex-shrink: 0;
            width: 180px;
            height: 120px;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.3);
        }

        /* 暗色模式下的图片区域 */
        [data-theme="dark"] .card-image {
            background: rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .card:hover .card-image img {
            transform: scale(1.05);
        }
        .card-image-placeholder {
            font-size: 32px;
            opacity: 0.3;
        }

        /* 内容区域 */
        .card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .tag { 
            font-size: 11px; font-weight: 600; 
            padding: 3px 8px; border-radius: 99px;
        }
        /* 分类标签颜色 - 简洁轮廓风格 */
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 99px;
            background: var(--bg-page);
            color: var(--text-sub);
            border: 1px solid var(--border);
        }
        .tag.tech { color: #3b82f6; }
        .tag.digital { color: #8b5cf6; }
        .tag.game { color: #ec4899; }
        .tag.news { color: #f59e0b; }
        .tag.ai { color: #10b981; }
        .tag.hot { color: #ef4444; }
        
        /* 图标样式 */
        .tag-icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 17px; font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-title a {
            color: var(--text-main);
            text-decoration: none;
        }
        .card-title a:hover { color: var(--primary); }

        .card-summary {
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }

        /* 底部区域 */
        .card-footer {
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        
        .comment-box {
            flex: 1;
            font-size: 12px;
            color: var(--text-sub);
            font-style: italic;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .date-tag {
            font-size: 11px;
            color: var(--text-sub);
            background: var(--bg-page);
            padding: 2px 8px;
            border-radius: 99px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .btn-read {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            background: transparent;
            padding: 5px 10px;
            border: 1px solid var(--primary);
            border-radius: 6px;
            text-decoration: none;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .btn-read:hover { 
            background: var(--primary);
            color: white;
        }

        /* ==================== 移动端适配 ==================== */
        @media (max-width: 640px) {
            header { flex-direction: column; align-items: flex-start; }
            .brand h1 { font-size: 24px; }
            
            .card-body {
                flex-direction: column;
                padding: 12px;
            }
            .card-image {
                width: 100%;
                height: 160px;
            }
            .card-title {
                font-size: 16px;
                -webkit-line-clamp: 3;
            }
            .card-summary {
                -webkit-line-clamp: 3;
            }
        }

        /* ==================== 骨架屏 ==================== */
        .skeleton { 
            background: var(--border); 
            border-radius: 8px; 
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 
            0%, 100% { opacity: 0.6; } 
            50% { opacity: 1; } 
        }

        /* ==================== 空状态 ==================== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;

                lyricText.textContent = track.name;
                lyricText.classList.remove('playing');
            }
        }

        // 播放/暂停切换
        function togglePlay() {
            const vinylIcon = document.getElementById('vinyl-icon');
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
                vinylIcon.classList.remove('playing');
            } else {
                audioPlayer.play().catch(err => {
                    console.log('播放失败:', err);
                });
                isPlaying = true;
                vinylIcon.classList.add('playing');
            }
            updateLyricDisplay();
        }

        // 播放模式切换
        function toggleMode() {
            const modeBtn = document.getElementById('mode-btn');
            const modes = ['loop', 'sequence', 'random'];
            const modeTitles = { 'loop': '循环播放', 'sequence': '顺序播放', 'random': '随机播放' };
            
            const currentIndex = modes.indexOf(playMode);
            playMode = modes[(currentIndex + 1) % modes.length];
            
            // 更新SVG图标
            const svgs = {
                'loop': '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>',
                'sequence': '<svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>',
                'random': '<svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>'
            };
            
            modeBtn.innerHTML = svgs[playMode];
            modeBtn.title = modeTitles[playMode];
        }

        // 处理歌曲结束
        function handleTrackEnd() {
            if (playMode === 'loop') {
                // 循环播放 - 单曲循环
                audioPlayer.currentTime = 0;
                audioPlayer.play();
            } else if (playMode === 'sequence') {
                // 顺序播放
                if (currentTrackIndex < playlist.length - 1) {
                    nextTrack();
                } else {
                    // 到最后一首停止
                    isPlaying = false;
                    document.getElementById('vinyl-icon').classList.remove('playing');
                    updateLyricDisplay();
                }
            } else if (playMode === 'random') {
                // 随机播放
                playedTracks.push(currentTrackIndex);
                if (playedTracks.length >= playlist.length) {
                    playedTracks = [currentTrackIndex]; // 重置
                }
                
                let nextIndex;
                do {
                    nextIndex = Math.floor(Math.random() * playlist.length);
                } while (playedTracks.includes(nextIndex));
                
                currentTrackIndex = nextIndex;
                loadTrack(currentTrackIndex);
                audioPlayer.play();
                updateLyricDisplay();
            }
        }

        // 下一首
        function nextTrack() {
            if (playMode === 'random') {
                playedTracks.push(currentTrackIndex);
                if (playedTracks.length >= playlist.length) {
                    playedTracks = [currentTrackIndex];
                }
                let nextIndex;
                do {
                    nextIndex = Math.floor(Math.random() * playlist.length);
                } while (playedTracks.includes(nextIndex));
                currentTrackIndex = nextIndex;
            } else {
                currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            }
            loadTrack(currentTrackIndex);
            if (isPlaying) {
                audioPlayer.play();
                updateLyricDisplay();
            }
        }

        // 上一首
        function previousTrack() {
            if (playMode === 'random' && playedTracks.length > 0) {
                // 随机模式下返回上一首（从播放历史）
                playedTracks.pop();
                currentTrackIndex = playedTracks[playedTracks.length - 1] || 0;
            } else {
                currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            }
            loadTrack(currentTrackIndex);
            if (isPlaying) {
                audioPlayer.play();
                updateLyricDisplay();
            }
        }

        // 播放指定曲目
        function playTrack(index) {
            loadTrack(index);
            if (!isPlaying) {
                isPlaying = true;
                document.getElementById('vinyl-icon').classList.add('playing');
            }
            audioPlayer.play();
            updateLyricDisplay();
        }

        // 展开/收起播放器
        function toggleExpanded(event) {
            if (event) event.stopPropagation();
            isExpanded = !isExpanded;
            expandedPlayer.classList.toggle('show', isExpanded);
        }

        // 渲染播放列表
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            playlist.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item-mini' + (index === currentTrackIndex ? ' active' : '');
                item.onclick = () => {
                    playTrack(index);
                    toggleExpanded();
                };
                item.innerHTML = `
                    <div class="item-icon">🎵</div>
                    <div class="item-info">
                        <div class="item-name">${track.name}</div>
                        <div class="item-artist">${track.artist}</div>
                    </div>
                `;
                playlistContainer.appendChild(item);
            });
        }

        // 更新播放列表UI
        function updatePlaylistUI() {
            const items = playlistContainer.querySelectorAll('.playlist-item-mini');
            items.forEach((item, index) => {
                item.classList.toggle('active', index === currentTrackIndex);
            });
        }

        // 点击外部关闭扩展播放器
        document.addEventListener('click', (e) => {
            if (isExpanded && !e.target.closest('.mini-player') && !e.target.closest('.expanded-player')) {
                isExpanded = false;
                expandedPlayer.classList.remove('show');
            }
        });

        // 初始化播放器
        window.addEventListener('load', initPlayer);

        function updateParallax() {
            const scrollY = window.scrollY;
            // 背景以 0.1 倍速度反向滚动，创造错层感
            parallaxBg.style.transform = `translateY(${-scrollY * 0.1}px)`;
            ticking = false;
        }

        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(updateParallax);
                ticking = true;
            }
        }, { passive: true });

        // 搜索处理
        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.toLowerCase();
            renderNews();
        }

        // 分类筛选
        function setCategory(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            renderNews();
        }

        // 获取配图URL（仅返回原文有的图，无图返回null）
        function getImageUrl(item) {
            if (item.image && item.image.startsWith('http')) {
                return item.image;
            }
            return null;
        }

        // 渲染新闻
        function renderNews() {
            const container = document.getElementById('news-container');

            container.style.opacity = '0.5';
            
            setTimeout(() => {
                container.innerHTML = '';
                
                // 合并所有日期的新闻
                let allArticles = [];
                Object.keys(archiveData).forEach(date => {
                    const dayData = archiveData[date];
                    if (dayData && dayData.articles) {
                        dayData.articles.forEach(item => {
                            allArticles.push({
                                ...item,
                                _date: date  // 记录日期用于显示
                            });
                        });
                    }
                });
                
                if (allArticles.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>暂无数据</p>
                        </div>`;
                    container.style.opacity = '1';
                    return;
                }

                // 按日期排序（最新的在前）
                allArticles.sort((a, b) => b._date.localeCompare(a._date));

                // 按分类筛选（3大分类）
                let filtered = allArticles.filter(item => {
                    const cat = categoryDisplayNames[item.category] || item.category;
                    return cat === currentCategory;
                });

                // 再按搜索筛选
                if (searchQuery) {
                    filtered = filtered.filter(item => 
                        item.title.toLowerCase().includes(searchQuery) ||
                        item.summary.toLowerCase().includes(searchQuery) ||
                        (item.comment && item.comment.toLowerCase().includes(searchQuery))
                    );
                }

                if (filtered.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🔍</div>
                            <p>没有找到匹配的新闻</p>
                        </div>`;
                    container.style.opacity = '1';
                    return;
                }

                filtered.forEach(item => {
                    const cat = categoryDisplayNames[item.category] || item.category;
                    const tagClass = categoryClasses[cat] || 'tech';
                    const catIcon = categoryIcons[cat] || '';
                    const imageUrl = getImageUrl(item);
                    const dateLabel = formatDate(item._date);
                    
                    // 有图时左图右文，无图时纯文字
                    const imageHtml = imageUrl 
                        ? `<div class="card-image"><img src="${imageUrl}" alt="${item.title}" loading="lazy"></div>`
                        : '';
                    
                    const html = `
                        <article class="card">
                            <div class="card-body">
                                ${imageHtml}
                                <div class="card-content">
                                    <div class="card-header">
                                        <div class="tags">
                                            <span class="tag ${tagClass}">${catIcon}${cat}</span>
                                            <span class="tag">${item.tag || '资讯'}</span>
                                        </div>
                                        <span class="date-tag" style="margin-left: auto;">${dateLabel}</span>
                                    </div>

                                    <h2 class="card-title">
                                        <a href="${item.link}" target="_blank">${item.title}</a>
                                    </h2>
                                    
                                    <p class="card-summary">${item.summary}</p>
                                    
                                    <div class="card-footer">
                                        <div class="comment-box">
                                            💬 ${item.comment || '暂无点评'}
                                        </div>
                                        <a href="${item.link}" target="_blank" class="btn-read">阅读全文 →</a>
                                    </div>
                                </div>
                            </div>
                        </article>
                    `;
                    container.innerHTML += html;
                });
                
                container.style.opacity = '1';
            }, 100);
        }

        // 加载数据
        fetch('news.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                if (!data || Object.keys(data).length === 0) throw new Error("Empty Data");
                archiveData = data;
                
                const now = new Date();
                const timeStr = now.toLocaleString('zh-CN', {month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'});
                document.getElementById('update-text').textContent = '已同步 ' + timeStr;
                document.querySelector('.dot').style.background = '#22c55e';
                
                renderNews();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('news-container').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <p>数据加载失败，请检查网络或稍后刷新</p>
                    </div>`;
            });
    </script>
</body>
</html>
