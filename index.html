<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 资讯聚合 - 科技/数码/游戏/时事</title>
    <style>
        /* ==================== CSS 变量定义 ==================== */
        :root {
            --primary: #2563eb;
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --shadow: rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border: #334155;
            --shadow: rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px 16px; }

        /* ==================== 头部 ==================== */
        header { 
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 12px;
            padding: 24px;
            margin: -20px -16px 24px -16px;
            border-radius: 0 0 24px 24px;
            background: 
                linear-gradient(to bottom, rgba(15, 23, 42, 0.3) 0%, rgba(15, 23, 42, 0.7) 100%),
                url('miyabi-bg.jpg');
            background-size: cover;
            background-position: center top;
            background-attachment: scroll;
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            min-height: 140px;
        }
        
        /* 确保内容在遮罩之上 */
        header > * {
            position: relative;
            z-index: 1;
        }
        
        /* 标题文字加阴影确保可读性 */
        .brand h1 {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            -webkit-text-fill-color: #fff;
            background: none;
        }
        
        .brand p {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-top: 4px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        


        .brand-with-search {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .search-toggle-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            margin-top: 4px;
        }
        .search-toggle-btn:hover {
            transform: scale(1.1);
            border-color: var(--primary);
        }

        .header-controls {
            display: flex; align-items: center; gap: 12px;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px; height: 40px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            transition: transform 0.2s;
        }
        .theme-toggle:hover { transform: scale(1.1); }

        .status-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--bg-card); border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 99px;
            font-size: 12px; color: var(--text-sub);
        }
        .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }

        /* ==================== 搜索框 ==================== */
        .search-box {
            position: relative;
            margin-bottom: 20px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }
        .search-box.active {
            max-height: 100px;
            opacity: 1;
            transform: translateY(0);
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--primary); }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 16px; top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }

        /* ==================== 分类筛选 ==================== */
        .category-filter {
            display: flex; flex-wrap: nowrap; gap: 6px;
            margin-bottom: 24px;
            padding: 4px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .category-filter::-webkit-scrollbar {
            display: none;
        }
        .category-btn {
            padding: 6px 12px;
            border-radius: 99px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-sub);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .category-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .category-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 分类颜色 */
        .category-btn[data-cat="科技"].active { background: #3b82f6; }
        .category-btn[data-cat="数码"].active { background: #8b5cf6; }
        .category-btn[data-cat="游戏"].active { background: #ec4899; }
        .category-btn[data-cat="时事"].active { background: #f59e0b; }
        .category-btn[data-cat="AI"].active { background: #10b981; }
        .category-btn[data-cat="热榜"].active { background: #ef4444; }

        /* 按钮图标样式 */
        .btn-icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
            margin-right: 4px;
            flex-shrink: 0;
        }

        /* ==================== 新闻卡片（带图片）==================== */
        .news-list { display: grid; gap: 20px; }
        
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 2px 8px var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 24px var(--shadow);
        }

        /* 卡片布局：左侧图片 + 右侧内容 */
        .card-body {
            display: flex;
            gap: 16px;
            padding: 16px;
        }

        /* 图片区域 */
        .card-image {
            flex-shrink: 0;
            width: 180px;
            height: 120px;
            border-radius: 12px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--bg-page), var(--border));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .card:hover .card-image img {
            transform: scale(1.05);
        }
        .card-image-placeholder {
            font-size: 32px;
            opacity: 0.3;
        }

        /* 内容区域 */
        .card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .tag { 
            font-size: 11px; font-weight: 600; 
            padding: 3px 8px; border-radius: 99px;
        }
        /* 分类标签颜色 - 简洁轮廓风格 */
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 99px;
            background: var(--bg-page);
            color: var(--text-sub);
            border: 1px solid var(--border);
        }
        .tag.tech { color: #3b82f6; }
        .tag.digital { color: #8b5cf6; }
        .tag.game { color: #ec4899; }
        .tag.news { color: #f59e0b; }
        .tag.ai { color: #10b981; }
        .tag.hot { color: #ef4444; }
        
        /* 图标样式 */
        .tag-icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 17px; font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-title a {
            color: var(--text-main);
            text-decoration: none;
        }
        .card-title a:hover { color: var(--primary); }

        .card-summary {
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }

        /* 底部区域 */
        .card-footer {
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        
        .comment-box {
            flex: 1;
            font-size: 12px;
            color: var(--text-sub);
            font-style: italic;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .date-tag {
            font-size: 11px;
            color: var(--text-sub);
            background: var(--bg-page);
            padding: 2px 8px;
            border-radius: 99px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .btn-read {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            background: transparent;
            padding: 5px 10px;
            border: 1px solid var(--primary);
            border-radius: 6px;
            text-decoration: none;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .btn-read:hover { 
            background: var(--primary);
            color: white;
        }

        /* ==================== 移动端适配 ==================== */
        @media (max-width: 640px) {
            header { flex-direction: column; align-items: flex-start; }
            .brand h1 { font-size: 24px; }
            
            .card-body {
                flex-direction: column;
                padding: 12px;
            }
            .card-image {
                width: 100%;
                height: 160px;
            }
            .card-title {
                font-size: 16px;
                -webkit-line-clamp: 3;
            }
            .card-summary {
                -webkit-line-clamp: 3;
            }
        }

        /* ==================== 骨架屏 ==================== */
        .skeleton { 
            background: var(--border); 
            border-radius: 8px; 
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 
            0%, 100% { opacity: 0.6; } 
            50% { opacity: 1; } 
        }

        /* ==================== 空状态 ==================== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-sub);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand-with-search">
                <div class="brand">
                    <h1>📰 资讯聚合</h1>
                    <p>科技 · 数码 · 游戏 + 热榜</p>
                </div>
                <button class="search-toggle-btn" onclick="toggleSearch()" title="搜索">🔍</button>
            </div>
            <div class="header-controls">
                <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
                <div class="status-pill">
                    <span class="dot"></span>
                    <span id="update-text">正在连接...</span>
                </div>
            </div>
        </header>

        <!-- 搜索框 -->
        <div class="search-box" id="search-box">
            <input type="text" id="search-input" placeholder="搜索标题或摘要..." oninput="handleSearch()">
        </div>

        <!-- 分类筛选 -->
        <div class="category-filter" id="category-filter">
            <button class="category-btn active" data-cat="all" onclick="setCategory('all', this)">全部</button>
            <button class="category-btn" data-cat="科技" onclick="setCategory('科技', this)"><svg class="btn-icon" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="14" rx="2"/><rect x="8" y="18" width="8" height="3" rx="1"/></svg>科技</button>
            <button class="category-btn" data-cat="数码" onclick="setCategory('数码', this)"><svg class="btn-icon" viewBox="0 0 24 24"><rect x="6" y="2" width="12" height="20" rx="2"/><circle cx="12" cy="18" r="1.5"/></svg>数码</button>
            <button class="category-btn" data-cat="游戏" onclick="setCategory('游戏', this)"><svg class="btn-icon" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="5"/><rect x="6" y="11" width="4" height="2" rx="1" fill="var(--bg-page)"/><circle cx="15" cy="12" r="1" fill="var(--bg-page)"/><circle cx="18" cy="12" r="1" fill="var(--bg-page)"/></svg>游戏</button>
            <button class="category-btn" data-cat="热榜" onclick="setCategory('热榜', this)"><svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 2c0 0-2 4-2 7s2 5 2 5 2-2 2-5-2-7-2-7z"/><path d="M7 7c0 0-1.5 3-1.5 5s1.5 4 1.5 4 1.5-1.5 1.5-4S7 7 7 7z" opacity="0.7"/><path d="M17 7c0 0-1.5 3-1.5 5s1.5 4 1.5 4 1.5-1.5 1.5-4S17 7 17 7z" opacity="0.7"/></svg>热榜</button>
        </div>

        <!-- 新闻列表 -->
        <main id="news-container" class="news-list">
            <div class="card">
                <div class="skeleton" style="width: 100%; height: 120px;"></div>
            </div>
        </main>
    </div>

    <script>
        let archiveData = {};
        let currentCategory = 'all';
        let searchQuery = '';

        const categoryClasses = {
            '科技': 'tech', '国内': 'tech', '国外': 'tech', 'AI': 'tech',
            '数码': 'digital',
            '游戏': 'game',
            '时事': 'hot',  // 时事合并到热榜
            '热榜': 'hot'
        };
        
        const categoryDisplayNames = {
            '国内': '科技',
            '国外': '科技',
            'AI': '科技',
            '时事': '热榜',  // 时事显示为热榜
            '热榜': '热榜'
        };

        // 分类图标 (面性/填充风格)
        const categoryIcons = {
            '科技': '<svg class="tag-icon" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="14" rx="2" fill="currentColor" opacity="0.9"/><rect x="8" y="18" width="8" height="3" rx="1" fill="currentColor"/></svg>',
            '数码': '<svg class="tag-icon" viewBox="0 0 24 24"><rect x="6" y="2" width="12" height="20" rx="2" fill="currentColor" opacity="0.9"/><circle cx="12" cy="18" r="1.5" fill="var(--bg-card)"/></svg>',
            '游戏': '<svg class="tag-icon" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="5" fill="currentColor" opacity="0.9"/><rect x="6" y="11" width="4" height="2" rx="1" fill="var(--bg-card)"/><circle cx="15" cy="12" r="1" fill="var(--bg-card)"/><circle cx="18" cy="12" r="1" fill="var(--bg-card)"/></svg>',
            'AI': '<svg class="tag-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="currentColor" opacity="0.9"/><circle cx="12" cy="12" r="3" fill="var(--bg-card)"/><circle cx="12" cy="5" r="1.5" fill="var(--bg-card)"/><circle cx="12" cy="19" r="1.5" fill="var(--bg-card)"/><circle cx="5" cy="12" r="1.5" fill="var(--bg-card)"/><circle cx="19" cy="12" r="1.5" fill="var(--bg-card)"/></svg>',
            '时事': '<svg class="tag-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.9"/><path d="M12 6v6l4 3" stroke="var(--bg-card)" stroke-width="2" stroke-linecap="round" fill="none"/></svg>',
            '热榜': '<svg class="tag-icon" viewBox="0 0 24 24"><path d="M12 2c0 0-2 4-2 7s2 5 2 5 2-2 2-5-2-7-2-7z" fill="currentColor"/><path d="M7 7c0 0-1.5 3-1.5 5s1.5 4 1.5 4 1.5-1.5 1.5-4S7 7 7 7z" fill="currentColor" opacity="0.7"/><path d="M17 7c0 0-1.5 3-1.5 5s1.5 4 1.5 4 1.5-1.5 1.5-4S17 7 17 7z" fill="currentColor" opacity="0.7"/></svg>'
        };

        // 农历数据（简化版，2024-2026年）
        const lunarData = {
            '2026-03-03': '正月十五', '2026-03-04': '正月十六', '2026-03-05': '正月十七',
            '2026-03-06': '正月十八', '2026-03-07': '正月十九', '2026-03-08': '正月二十',
            '2026-03-09': '正月廿一', '2026-03-10': '正月廿二', '2026-03-11': '正月廿三',
            '2026-03-12': '正月廿四', '2026-03-13': '正月廿五', '2026-03-14': '正月廿六',
            '2026-03-15': '正月廿七', '2026-03-16': '正月廿八', '2026-03-17': '正月廿九',
            '2026-03-18': '正月三十', '2026-03-19': '二月初一', '2026-03-20': '二月初二',
            // 可以继续添加更多日期
        };
        
        const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        
        // 格式化日期显示
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekDay = weekDays[date.getDay()];
            return `${month}月${day}日 ${weekDay}`;
        }

        // 搜索框切换
        function toggleSearch() {
            const searchBox = document.getElementById('search-box');
            const searchInput = document.getElementById('search-input');
            searchBox.classList.toggle('active');
            if (searchBox.classList.contains('active')) {
                setTimeout(() => searchInput.focus(), 100);
            } else {
                searchInput.value = '';
                searchQuery = '';
                renderNews();
            }
        }

        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
        }

        // 初始化主题
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.querySelector('.theme-toggle').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        // 搜索处理
        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.toLowerCase();
            renderNews();
        }

        // 分类筛选
        function setCategory(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            renderNews();
        }

        // 获取配图URL（仅返回原文有的图，无图返回null）
        function getImageUrl(item) {
            if (item.image && item.image.startsWith('http')) {
                return item.image;
            }
            return null;
        }

        // 渲染新闻
        function renderNews() {
            const container = document.getElementById('news-container');

            container.style.opacity = '0.5';
            
            setTimeout(() => {
                container.innerHTML = '';
                
                // 合并所有日期的新闻
                let allArticles = [];
                Object.keys(archiveData).forEach(date => {
                    const dayData = archiveData[date];
                    if (dayData && dayData.articles) {
                        dayData.articles.forEach(item => {
                            allArticles.push({
                                ...item,
                                _date: date  // 记录日期用于显示
                            });
                        });
                    }
                });
                
                if (allArticles.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>暂无数据</p>
                        </div>`;
                    container.style.opacity = '1';
                    return;
                }

                // 按日期排序（最新的在前）
                allArticles.sort((a, b) => b._date.localeCompare(a._date));

                // 按分类筛选
                let filtered = allArticles;
                if (currentCategory === 'all') {
                    // 全部：排除热榜（热榜独立于科技/数码/游戏）
                    filtered = filtered.filter(item => {
                        const cat = categoryDisplayNames[item.category] || item.category;
                        return cat !== '热榜';
                    });
                } else if (currentCategory === '热榜') {
                    // 热榜：显示最近7天的内容
                    const today = new Date();
                    const sevenDaysAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
                    
                    filtered = filtered.filter(item => {
                        const cat = categoryDisplayNames[item.category] || item.category;
                        if (cat !== '热榜') return false;
                        // 解析日期 YYYY-MM-DD
                        const parts = item._date.split('-');
                        const itemDate = new Date(parts[0], parts[1] - 1, parts[2]);
                        return itemDate >= sevenDaysAgo;
                    });
                    
                    // 热榜按日期倒序排列（最新的在前面）
                    filtered.sort((a, b) => b._date.localeCompare(a._date));
                } else {
                    filtered = filtered.filter(item => {
                        const cat = categoryDisplayNames[item.category] || item.category;
                        return cat === currentCategory;
                    });
                }

                // 再按搜索筛选
                if (searchQuery) {
                    filtered = filtered.filter(item => 
                        item.title.toLowerCase().includes(searchQuery) ||
                        item.summary.toLowerCase().includes(searchQuery) ||
                        (item.comment && item.comment.toLowerCase().includes(searchQuery))
                    );
                }

                if (filtered.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🔍</div>
                            <p>没有找到匹配的新闻</p>
                        </div>`;
                    container.style.opacity = '1';
                    return;
                }

                filtered.forEach(item => {
                    const cat = categoryDisplayNames[item.category] || item.category;
                    const tagClass = categoryClasses[cat] || 'tech';
                    const catIcon = categoryIcons[cat] || '';
                    const imageUrl = getImageUrl(item);
                    const dateLabel = formatDate(item._date);
                    
                    // 有图时左图右文，无图时纯文字
                    const imageHtml = imageUrl 
                        ? `<div class="card-image"><img src="${imageUrl}" alt="${item.title}" loading="lazy"></div>`
                        : '';
                    
                    const html = `
                        <article class="card">
                            <div class="card-body">
                                ${imageHtml}
                                <div class="card-content">
                                    <div class="card-header">
                                        <div class="tags">
                                            <span class="tag ${tagClass}">${catIcon}${cat}</span>
                                            <span class="tag">${item.tag || '资讯'}</span>
                                        </div>
                                        <span class="date-tag" style="margin-left: auto;">${dateLabel}</span>
                                    </div>

                                    <h2 class="card-title">
                                        <a href="${item.link}" target="_blank">${item.title}</a>
                                    </h2>
                                    
                                    <p class="card-summary">${item.summary}</p>
                                    
                                    <div class="card-footer">
                                        <div class="comment-box">
                                            💬 ${item.comment || '暂无点评'}
                                        </div>
                                        <a href="${item.link}" target="_blank" class="btn-read">阅读全文 →</a>
                                    </div>
                                </div>
                            </div>
                        </article>
                    `;
                    container.innerHTML += html;
                });
                
                container.style.opacity = '1';
            }, 100);
        }

        // 加载数据
        fetch('news.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                if (!data || Object.keys(data).length === 0) throw new Error("Empty Data");
                archiveData = data;
                
                document.getElementById('update-text').textContent = '已同步';
                document.querySelector('.dot').style.background = '#22c55e';
                
                renderNews();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('news-container').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <p>数据加载失败，请检查网络或稍后刷新</p>
                    </div>`;
            });
    </script>
</body>
</html>
