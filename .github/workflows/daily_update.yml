name: Daily AI News Update

on:
  schedule:
    # 北京时间 8/10/12/14/16/18/20点 (UTC 0/2/4/6/8/10/12点)
    - cron: '0 0,2,4,6,8,10,12 * * *'
  workflow_dispatch:      # 允许手动运行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # 升级到 3.11，消除警告
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 🔥 核心修复：这里加了 pytz
        pip install feedparser openai pytz python-dotenv
        
    - name: Run script
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: python auto_gen.py
      
    - name: Commit and push changes
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        
        # 检查有没有生成 news.json
        if [ -f "news.json" ]; then
            git add news.json
            
            # 检查文件是否有变化
            if git diff --staged --quiet; then
                echo "没有新新闻，跳过提交"
            else
                git commit -m "Auto update news: $(date +'%Y-%m-%d')"
                # 使用 Token 权限推送
                git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
            fi
        else
            echo "错误：news.json 没有生成！请检查 Run script 步骤的日志。"
            exit 1
        fi
