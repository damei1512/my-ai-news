name: AI资讯日报更新

on:
  schedule:
    # 每天3次: 08:00, 13:00, 18:00 (UTC+8)
    - cron: '0 0 * * *'    # 08:00 CST
    - cron: '0 5 * * *'    # 13:00 CST  
    - cron: '0 10 * * *'   # 18:00 CST
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 安装依赖
      run: |
        pip install feedparser google-generativeai python-dotenv pytz
        
    - name: 生成早间完整版 (08:00)
      if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python auto_gen.py
        
    - name: 生成午间热榜版 (13:00)
      if: github.event.schedule == '0 5 * * *'
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python gen_rebang.py
        
    - name: 生成晚间热榜版 (18:00)
      if: github.event.schedule == '0 10 * * *'
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python gen_rebang.py
        
    - name: 提交并推送
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add news.json
        git diff --staged --quiet || git commit -m "auto: 更新AI资讯 $(date '+%m-%d %H:%M')"
        git push
