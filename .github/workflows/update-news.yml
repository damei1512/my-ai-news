name: AI资讯日报更新

on:
  schedule:
    # 每2小时更新一次（北京时间 08:00, 10:00, 12:00, 14:00, 16:00, 18:00, 20:00, 22:00）
    - cron: '0 0 * * *'    # 08:00 CST
    - cron: '0 2 * * *'    # 10:00 CST
    - cron: '0 4 * * *'    # 12:00 CST
    - cron: '0 6 * * *'    # 14:00 CST
    - cron: '0 8 * * *'    # 16:00 CST
    - cron: '0 10 * * *'   # 18:00 CST
    - cron: '0 12 * * *'   # 20:00 CST
    - cron: '0 14 * * *'   # 22:00 CST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install feedparser openai python-dotenv pytz
    
    - name: 更新AI资讯
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: python auto_gen.py
      
    - run: |
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        git add news.json
        git commit -m "auto: 更新AI资讯 $(date '+%m-%d %H:%M')" || true
        git push
