name: Update Site Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

concurrency:
  group: update-site-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-data:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline
        env:
          TIMEZONE: Asia/Shanghai
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com' }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'deepseek-chat' }}
        run: python scripts/run_pipeline.py --json

      - name: Show Latest Status
        run: python scripts/run_pipeline.py --status --json

      - name: Commit Published Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: update published site data"
          git push
